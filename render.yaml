services:
  - type: web
    name: nimbus-api
    runtime: docker
    plan: free
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    autoDeployTrigger: checksPass
    healthCheckPath: /ready
    preDeployCommand: >-
      node node_modules/prisma/build/index.js migrate deploy
      --schema=node_modules/@nimbus/db/prisma/schema.prisma
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEPLOYMENT_PROFILE
        value: production
      - key: API_PORT
        value: 10000
      - key: AUTH_MODE
        value: authjs
      - key: DEV_AUTH_ENABLED
        value: false
      - key: TRUST_PROXY
        value: true
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: nimbus-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: nimbus-redis
          property: connectionString
      - key: PUBLIC_WEB_URL
        sync: false
      - key: PUBLIC_API_URL
        sync: false
      - key: ALLOWED_WEB_ORIGINS
        sync: false
      - key: API_AUTH_SECRET
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_FORCE_PATH_STYLE
        value: false

  - type: keyvalue
    name: nimbus-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: noeviction

databases:
  - name: nimbus-postgres
    plan: free
    databaseName: nimbus
    user: nimbus