services:
  - type: web
    name: nimbus-api
    runtime: docker
    plan: free
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    autoDeployTrigger: checksPass
    healthCheckPath: /ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEPLOYMENT_PROFILE
        value: production
      - key: API_PORT
        value: 10000
      - key: AUTH_MODE
        value: authjs
      - key: DEV_AUTH_ENABLED
        value: false
      - key: TRUST_PROXY
        value: true
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: nimbus-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: nimbus-redis
          property: connectionString
      - key: PUBLIC_WEB_URL
        sync: false
      - key: PUBLIC_API_URL
        sync: false
      - key: ALLOWED_WEB_ORIGINS
        sync: false
      - key: API_AUTH_SECRET
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_FORCE_PATH_STYLE
        value: false

  - type: worker
    name: nimbus-worker
    runtime: docker
    plan: starter
    dockerfilePath: ./apps/worker/Dockerfile
    dockerContext: .
    autoDeployTrigger: checksPass
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEPLOYMENT_PROFILE
        value: production
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: nimbus-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: nimbus-redis
          property: connectionString
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_FORCE_PATH_STYLE
        value: false
      - key: THUMBNAIL_MAX_INPUT_BYTES
        value: 20971520
      - key: THUMBNAIL_MAX_PIXEL_COUNT
        value: 40000000
      - key: THUMBNAIL_MAX_WIDTH
        value: 12000
      - key: THUMBNAIL_MAX_HEIGHT
        value: 12000
      - key: THUMBNAIL_OUTPUT_WIDTH
        value: 320
      - key: THUMBNAIL_OUTPUT_HEIGHT
        value: 320
      - key: THUMBNAIL_PROCESSING_TIMEOUT_MS
        value: 15000
      - key: UPLOAD_FINALIZATION_CONCURRENCY
        value: 2
      - key: METADATA_INDEXING_CONCURRENCY
        value: 5
      - key: THUMBNAIL_GENERATION_CONCURRENCY
        value: 2
      - key: OBJECT_CLEANUP_CONCURRENCY
        value: 3

  - type: keyvalue
    name: nimbus-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: noeviction

databases:
  - name: nimbus-postgres
    plan: free
    databaseName: nimbus
    user: nimbus
