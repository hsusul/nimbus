services:
  postgres:
    image: postgres:16-alpine
    container_name: nimbus-postgres
    environment:
      POSTGRES_DB: nimbus
      POSTGRES_USER: nimbus
      POSTGRES_PASSWORD: nimbus
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nimbus -d nimbus"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nimbus-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: nimbus-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: nimbus
      MINIO_ROOT_PASSWORD: nimbus-secret
      MINIO_API_CORS_ALLOW_ORIGIN: http://localhost:3000,http://localhost:3100
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/minio:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 nimbus nimbus-secret;
      mc mb --ignore-existing local/nimbus-local;
      mc anonymous set none local/nimbus-local;
      "

volumes:
  postgres-data:
  minio-data:
